name: Advanced Single Job Pipeline
'on':
  workflow_dispatch: null
env:
  API_URL: https://api.example.com
  NODE_ENV: production
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    services:
      redis:
        image: redis:alpine
        ports:
          - '6379:6379'
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if ! command -v npm > /dev/null 2>&1; then npm install -g npm; fi
          npm ci

      - name: Run Tests with Debug
        if: ${{ github.event.inputs.debug_mode == 'true' }}
        run: |
          echo "Debug mode is ON"
          DEBUG=* npm run test

      - name: Run Tests
        run: npm test

      - name: Normal Tests
        if: ${{ github.event.inputs.debug_mode != 'true' }}
        run: npm run test

      - name: Slack Notification on Failure
        if: failure()
        run: echo "Alert! Pipeline failed! 🚨"
