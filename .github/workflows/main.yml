name: Advanced Single Job Pipeline
'on':
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_mode:
        description: Enable debug logging
        required: false
        type: boolean
        default: false
env:
  API_URL: https://api.example.com
  NODE_ENV: production
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: read
    services:
      redis:
        image: redis:alpine
        ports:
          - '6379:6379'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Prepare Package Manager
        run: |
          if [ "npm" == "pnpm" ]; then
            npm install -g pnpm
          elif [ "npm" == "yarn" ]; then
            npm install -g yarn
          elif [ "npm" == "bun" ]; then
            npm install -g bun
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests with Debug
        if: ${{ github.event.inputs.debug_mode == 'true' }}
        run: |
          echo "Debug mode is ON"
          DEBUG=* npm run test
      - name: Normal Tests
        if: ${{ github.event.inputs.debug_mode != 'true' }}
        run: npm run test
      - name: Slack Notification on Failure
        if: failure()
        run: echo "Alert! Pipeline failed! 🚨"
      - name: Run Tests
        run: npm test
      - name: Build Docker Image
        run: docker build -t username/repo:latest .
      - name: Push to Docker Hub
        if: false
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push username/repo:latest
