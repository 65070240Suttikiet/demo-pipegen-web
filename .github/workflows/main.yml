name: Auto-Generated-Pipeline
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Package Manager
        run: |
          if [ "npm" == "pnpm" ]; then
            npm install -g pnpm
          elif [ "npm" == "yarn" ]; then
            npm install -g yarn
          elif [ "npm" == "bun" ]; then
            npm install -g bun
          fi

      - name: Install Dependencies
        run: |
          if ! command -v yarn > /dev/null 2>&1; then npm install -g yarn; fi
          npm install

      - name: Build Docker Image
        run: docker build -t tigerntun/repo:latest .

      - name: Push to Docker Hub
        if: false
        run: |
          echo "docker build -t username/repo:latest ." | docker login -u "docker build -t username/repo:latest ." --password-stdin
          docker push tigerntun/repo:latest
